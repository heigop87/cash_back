  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 9h18\"><\u002Fpath><\u002Fsvg>No credit hit<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#727279;font-weight:500;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"6\"><\u002Fcircle><path d=\"M15.5 13.5 17 22l-5-3-5 3 1.5-8.5\"><\u002Fpath><\u002Fsvg>SOC 2 certified<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#727279;font-weight:500;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3.5 9h17M3.5 15h17M12 3a14 14 0 0 0 0 18M12 3a14 14 0 0 1 0 18\"><\u002Fpath><\u002Fsvg>GDPR compliant<\u002Fspan>\n            <\u002Fdiv>\n\n            <p style=\"font-size:11.5px;color:#727279;margin:14px auto 0;max-width:380px;line-height:1.5;text-align:center;\">YachtWay never sells your information. We share it only with the lender matched to your application, and only to process this loan offer.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- SUCCESS -->\n        <sc-if value=\"{{ showSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:26px 24px 28px;animation:ywfade .3s ease-out;\">\n            <span style=\"display:inline-flex;width:58px;height:58px;border-radius:50%;background:#F4EEFF;align-items:center;justify-content:center;margin-bottom:14px;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2B0075\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5 11-11\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <h2 style=\"font-family:'Poppins';font-weight:700;font-size:23px;margin:0 0 8px;letter-spacing:-.02em;\">Your offer is locked in<\u002Fh2>\n            <p style=\"font-size:14.5px;color:#575760;margin:0 auto;max-width:330px;line-height:1.5;\">Nice work, {{ firstName }}. We are holding your <strong style=\"color:#1A1635;\">{{ greetCash }}<\u002Fstrong> offer. A YachtWay advisor will reach out shortly.<\u002Fp>\n\n\n            <div style=\"display:flex;gap:10px;margin:22px 0 0;\">\n              <div style=\"flex:1;background:#F9F7FE;border:1px solid #ECE6FA;border-radius:13px;padding:15px 12px;text-align:center;\">\n                <div style=\"font-size:12px;color:#727279;font-weight:500;\">Potential cash back<\u002Fdiv>\n                <div style=\"font-family:'Poppins';font-weight:700;font-size:21px;color:#2B0075;margin-top:3px;letter-spacing:-.01em;\">{{ cashOnlyStr }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;background:#F9FAFB;border:1px solid #F1F1F2;border-radius:13px;padding:15px 12px;text-align:center;\">\n                <div style=\"font-size:12px;color:#727279;font-weight:500;\">Vessel price<\u002Fdiv>\n                <div style=\"font-family:'Poppins';font-weight:700;font-size:21px;color:#1A1635;margin-top:3px;letter-spacing:-.01em;\">{{ enteredPriceStr }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <button onclick=\"{{ closeModal }}\" style=\"margin-top:22px;width:100%;background:#2B0075;color:#fff;border:none;font-family:'Figtree';font-weight:700;font-size:15px;border-radius:11px;padding:14px;cursor:pointer;\" style-hover=\"background:#1B0050;\">Done<\u002Fbutton>\n\n            <p style=\"font-size:11.5px;color:#575760;margin:18px auto 0;max-width:380px;line-height:1.55;text-align:center;\">Cash back is an estimate, not a guaranteed amount. The final amount depends on your approved loan size and is subject to lender approval. YachtWay connects you with lenders and is not the lender. Cash back is paid only after a lender approves your application and your loan closes through YachtWay.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:680,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    price: 0, buyTiming: '', firstName: '', lastName: '', email: '', phone: '',\n    modalOpen: false, modalStep: 1, submitted: false, error: false, lockedAt: 0,\n    downPct: 20, downMode: '20', term: 240, termMode: '20', calcApr: 6.25,\n    revIdx: 0, now: Date.now(),\n  };\n\n  componentDidMount() {\n    try { const s = JSON.parse(localStorage.getItem('yw-cashback')); if (s) this.setState(s); } catch (e) {}\n    this._t = setInterval(() => this.setState({ now: Date.now() }), 1000);\n  }\n  componentWillUnmount() { clearInterval(this._t); }\n\n  persist() {\n    const { price, buyTiming, firstName, lastName, email, phone, submitted, lockedAt, downPct, downMode, term, termMode, calcApr } = this.state;\n    try { localStorage.setItem('yw-cashback', JSON.stringify({ price, buyTiming, firstName, lastName, email, phone, submitted, lockedAt, downPct, downMode, term, termMode, calcApr })); } catch (e) {}\n  }\n  set(patch) { this.setState(patch, () => this.persist()); }\n\n  amortize(loan, aprPct, months) {\n    const r = aprPct / 100 / 12;\n    if (r === 0) return loan / months;\n    return loan * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);\n  }\n  money(n) { return '$' + Math.round(n).toLocaleString('en-US'); }\n  seg(active) { return 'flex:1;padding:11px 6px;border-radius:9px;font-family:Figtree,system-ui,sans-serif;font-weight:600;font-size:13px;cursor:pointer;text-align:center;border:1px solid ' + (active ? '#2B0075' : '#DCDCDE') + ';background:' + (active ? '#2B0075' : '#fff') + ';color:' + (active ? '#fff' : '#3C3C46') + ';'; }\n  timingSeg(active) { return 'padding:11px 8px;border-radius:10px;font-family:Figtree,system-ui,sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;text-align:center;border:1px solid ' + (active ? '#2B0075' : '#DCDCDE') + ';background:' + (active ? '#2B0075' : '#fff') + ';color:' + (active ? '#fff' : '#3C3C46') + ';transition:.12s;'; }\n\n  cashBack(loan) { return Math.min(5000, Math.floor(loan * 0.003 / 100) * 100); }\n\n  reviews() {\n    return [\n      { text: '\"Discreet, quick, and the rate I was quoted was exactly the rate I closed at.\"', name: 'Kenzie D.', initials: 'KD', vessel: 'Azimut 62S' },\n      { text: \"\\\"I closed on a 42' Riviera at 6.89% in 8 days. The whole thing felt built for serious buyers.\\\"\", name: 'Semaj P.', initials: 'SP', vessel: \"42' Riviera\" },\n      { text: '\"Super professional. Always available. They understand all your needs.\"', name: 'Camden J.', initials: 'CJ', vessel: 'Riva 88' },\n      { text: '\"I applied through YachtWay and had a great experience. My contact, Debbie, was super helpful and got me approved the same day. We closed on our new boat the following week.\"', name: 'Ethan M.', initials: 'EM', vessel: 'Viking 55' },\n    ];\n  }\n  setRev(i) { const n = this.reviews().length; this.setState({ revIdx: (i + n) % n }); }\n  pad(n) { return (n < 10 ? '0' : '') + n; }\n\n  renderVals() {\n    const st = this.state;\n\n    const earnLoan = (st.price || 0) * 0.8;\n    const hasEarn = earnLoan >= 25000;\n    const belowMin = st.price > 0 && earnLoan < 25000;\n    const cash = this.cashBack(earnLoan);\n    const cashStr = '$' + cash.toLocaleString('en-US');\n\n    const cashHeadline = hasEarn ? ('Up to ' + cashStr + ' cash back') : (belowMin ? 'Cash back' : 'Up to $5,000 cash back');\n    const cashSub = hasEarn ? 'Paid as cash back when your loan closes through YachtWay' : (belowMin ? 'Loans start at $25,000' : 'Enter your vessel price to see your number');\n    const ctaLabel = hasEarn ? ('Lock in ' + cashStr + ' cash back') : 'Lock in your cash back';\n\n    const HELD = 72 * 3600 * 1000;\n    const remain = st.submitted ? Math.max(0, st.lockedAt + HELD - st.now) : HELD;\n    const hh = Math.floor(remain / 3600000), mm = Math.floor((remain % 3600000) / 60000), ss = Math.floor((remain % 60000) / 1000);\n\n    const timing = ['Now', '1–3 months', '3–6 months', 'Just exploring'];\n\n    const loanCalc = st.price * (1 - st.downPct / 100);\n    const calcMonthlyStr = st.price ? this.money(this.amortize(loanCalc, st.calcApr, st.term)) + '/mo' : '—';\n    const cmLen = calcMonthlyStr.length;\n    const calcMonthlySize = cmLen <= 11 ? 'clamp(30px,7vw,44px)' : (cmLen <= 13 ? 'clamp(24px,6vw,34px)' : 'clamp(18px,4.6vw,26px)');\n\n    const rv = this.reviews()[st.revIdx];\n\n    return {\n      // hero / cash\n      priceStr: st.price ? Number(st.price).toLocaleString('en-US') : '',\n      setPrice: (e) => this.set({ price: Math.max(0, parseInt((e.target.value || '0').replace(/[^\\d]/g, '') || '0', 10)) }),\n      cashHeadline, cashSub, ctaLabel,\n\n      // modal\n      modalOpen: st.modalOpen,\n      openModal: () => this.set({ modalOpen: true, modalStep: 1, submitted: false, error: false }),\n      closeModal: () => this.set({ modalOpen: false }),\n      stop: (e) => e.stopPropagation(),\n      modalStep1: st.modalStep === 1,\n      modalStep2: st.modalStep === 2,\n      continueStep: () => { if (!st.buyTiming) { this.set({ error: true }); return; } this.set({ modalStep: 2, error: false }); },\n      modalBack: () => this.set({ modalStep: 1, error: false }),\n      showForm: !st.submitted,\n      showSuccess: st.submitted,\n      error: st.error,\n      modalCash: hasEarn ? ('Up to ' + cashStr + ' cash back') : 'Up to $5,000 cash back',\n      greetCash: hasEarn ? ('up to ' + cashStr + ' cash back') : 'up to $5,000 cash back',\n      cashOnlyStr: hasEarn ? ('Up to ' + cashStr) : 'Up to $5,000',\n      enteredPriceStr: st.price ? this.money(st.price) : 'Not set',\n      modalCashSub: hasEarn ? ('Estimated ' + this.money(earnLoan) + ' financed on your vessel') : (belowMin ? 'Loans start at $25,000' : 'Add your vessel price for an exact number'),\n      lockLabel: hasEarn ? ('Lock in ' + cashStr) : 'Lock this offer in',\n      heldStr: this.pad(hh) + ':' + this.pad(mm) + ':' + this.pad(ss),\n\n      firstName: st.firstName, lastName: st.lastName, email: st.email, phone: st.phone,\n      timingOptions: timing.map(t => ({ v: t, label: t, style: this.timingSeg(st.buyTiming === t) })),\n      onTiming: (e) => this.set({ buyTiming: e.currentTarget.dataset.v }),\n      setFirst: (e) => this.set({ firstName: e.target.value }),\n      setLast: (e) => this.set({ lastName: e.target.value }),\n      setEmail: (e) => this.set({ email: e.target.value }),\n      setPhone: (e) => {\n        const d = (e.target.value || '').replace(/\\D/g, '').slice(0, 10); let f = d;\n        if (d.length > 6) f = '(' + d.slice(0, 3) + ') ' + d.slice(3, 6) + '-' + d.slice(6);\n        else if (d.length > 3) f = '(' + d.slice(0, 3) + ') ' + d.slice(3);\n        else if (d.length > 0) f = '(' + d;\n        this.set({ phone: f });\n      },\n      submit: () => {\n        const emailOk = /.+@.+\\..+/.test(st.email);\n        const phoneOk = (st.phone || '').replace(/\\D/g, '').length >= 10;\n        if (!st.buyTiming || !st.firstName.trim() || !st.lastName.trim() || !emailOk || !phoneOk) { this.set({ error: true }); return; }\n        this.set({ submitted: true, error: false, lockedAt: Date.now() });\n      },\n\n      // reviews\n      revText: rv.text, revName: rv.name, revInitials: rv.initials, revVessel: rv.vessel || false,\n      revDot0: 'width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .15s;background:' + (st.revIdx === 0 ? '#2B0075' : '#DCDCE2') + ';',\n      revDot1: 'width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .15s;background:' + (st.revIdx === 1 ? '#2B0075' : '#DCDCE2') + ';',\n      revDot2: 'width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .15s;background:' + (st.revIdx === 2 ? '#2B0075' : '#DCDCE2') + ';',\n      revDot3: 'width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .15s;background:' + (st.revIdx === 3 ? '#2B0075' : '#DCDCE2') + ';',\n      setRev0: () => this.setRev(0), setRev1: () => this.setRev(1), setRev2: () => this.setRev(2), setRev3: () => this.setRev(3),\n      revPrev: () => this.setRev(st.revIdx - 1), revNext: () => this.setRev(st.revIdx + 1),\n      onRevTouchStart: (e) => { this._sx = (e.touches ? e.touches[0].clientX : e.clientX); this._sl = this._sx; },\n      onRevTouchMove: (e) => { this._sl = (e.touches ? e.touches[0].clientX : e.clientX); },\n      onRevTouchEnd: (e) => { const end = (e.changedTouches ? e.changedTouches[0].clientX : (this._sl != null ? this._sl : e.clientX)); const start = (this._sx == null ? end : this._sx); const dx = end - start; this._sx = null; this._sl = null; if (Math.abs(dx) > 30) this.setRev(st.revIdx + (dx < 0 ? 1 : -1)); },\n\n      // calculator\n      downAmt: this.money(st.price * st.downPct / 100),\n      downSeg10: this.seg(st.downMode !== 'other' && st.downPct === 10),\n      downSeg20: this.seg(st.downMode !== 'other' && st.downPct === 20),\n      downSegOther: this.seg(st.downMode === 'other'),\n      downIsOther: st.downMode === 'other',\n      downCustomStr: String(Math.round(st.downPct)),\n      setDown10: () => this.set({ downPct: 10, downMode: '10' }),\n      setDown20: () => this.set({ downPct: 20, downMode: '20' }),\n      setDownOther: () => this.set({ downMode: 'other' }),\n      setDownCustom: (e) => this.set({ downPct: Math.min(100, Math.max(0, parseInt((e.target.value || '0').replace(/[^\\d]/g, '') || '0', 10))), downMode: 'other' }),\n      termSeg10: this.seg(st.termMode !== 'other' && st.term === 120),\n      termSeg20: this.seg(st.termMode !== 'other' && st.term === 240),\n      termSegOther: this.seg(st.termMode === 'other'),\n      termIsOther: st.termMode === 'other',\n      termYears: Math.round(st.term / 12),\n      setTerm10: () => this.set({ term: 120, termMode: '10' }),\n      setTerm20: () => this.set({ term: 240, termMode: '20' }),\n      setTermOther: () => this.set({ termMode: 'other' }),\n      setTermCustom: (e) => this.set({ term: Math.min(25, Math.max(1, parseInt((e.target.value || '0').replace(/[^\\d]/g, '') || '1', 10))) * 12, termMode: 'other' }),\n      calcApr: st.calcApr, calcAprStr: st.calcApr.toFixed(2) + '%',\n      setCalcApr: (e) => this.set({ calcApr: parseFloat(e.target.value) }),\n      calcMonthly: calcMonthlyStr, calcMonthlySize: calcMonthlySize,\n      calcSummary: st.price ? this.money(loanCalc) + ' financed · ' + (st.term / 12) + ' yr' : 'Enter a price to estimate',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
